<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Replay · Tenera</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rrweb-player@1.1.3/dist/style.css">
  <style>
    body { background: var(--bg-base); display: flex; flex-direction: column; align-items: center; padding: 32px 16px; min-height: 100vh; }
    .replay-header { width: 100%; max-width: 1100px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .replay-header a { font-size: 12px; color: var(--text-3); text-decoration: none; }
    .replay-header a:hover { color: var(--text-1); }
    .replay-header h2 { font-size: 15px; font-weight: 600; color: var(--text-1); }
    #player-wrap { width: 100%; max-width: 1100px; }
    #loading { color: var(--text-3); font-size: 13px; text-align: center; padding: 48px; }
    /* Ensure the rrweb-player timeline row stays horizontal with a visible progress bar.
       Our page-level styles (flex column on body, CSS vars) can collapse the timeline. */
    .rr-timeline {
      display: flex !important;
      flex-direction: row !important;
      align-items: center;
      width: 100%;
      gap: 8px;
    }
    .rr-progress {
      flex: 1 !important;
      display: block !important;
      height: 8px !important;
      min-width: 0;
      background: #e8e0d4 !important;
      border-radius: 4px;
      position: relative !important;
      overflow: visible !important;
      cursor: pointer;
    }
    .rr-progress__step {
      display: block !important;
      position: absolute !important;
      left: 0; top: 0; bottom: 0;
      background: #241f1a !important;
      border-radius: 4px;
    }
    .rr-progress__handler {
      display: block !important;
      position: absolute !important;
      width: 14px !important;
      height: 14px !important;
      border-radius: 50% !important;
      background: #241f1a !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      cursor: grab;
    }
  </style>
</head>
<body>
  <div class="replay-header">
    <a href="/">&larr; Dashboard</a>
    <h2>Session Replay</h2>
    <span style="font-size:11px;color:var(--text-3);font-family:monospace">{{ session_id }}</span>
  </div>
  <div id="player-wrap">
    <div id="loading">Loading session…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/rrweb-player@1.1.3/dist/index.js"></script>
  <script>
    const SESSION_ID = '{{ session_id }}';
    const API_KEY    = '{{ api_key }}';
    const startAt    = parseInt(new URLSearchParams(location.search).get('t') || '0', 10);

    fetch(`/api/v1/sessions/${SESSION_ID}/events`, {
      headers: { 'X-API-Key': API_KEY }
    })
      .then(r => r.json())
      .then(({ events }) => {
        document.getElementById('loading').remove();
        if (!events || events.length < 2) {
          document.getElementById('player-wrap').innerHTML =
            '<p style="color:var(--text-3);text-align:center;padding:48px">Not enough events to replay yet.</p>';
          return;
        }
        const player = new rrwebPlayer({
          target: document.getElementById('player-wrap'),
          props: {
            events,
            width: Math.min(window.innerWidth - 32, 1100),
            height: Math.round(Math.min(window.innerWidth - 32, 1100) * 0.625),
            autoPlay: true,
            showController: true,
            skipInactive: true,
          },
        });
        if (startAt > 0) {
          setTimeout(() => { try { player.goto(startAt); } catch(e) {} }, 400);
        }

        // Fix 1: skip-inactive should jump directly to the next active event, not speed up.
        const replayer = player.getReplayer();
        const startTime = player.getMetaData().startTime;
        replayer.on('skip-start', function() {
          const nextEvent = replayer.nextUserInteractionEvent;
          if (!nextEvent) return;
          const targetOffset = nextEvent.timestamp - startTime;
          replayer.nextUserInteractionEvent = null;
          replayer.speedService.send({ type: 'BACK_TO_NORMAL' });
          setTimeout(function() { replayer.play(targetOffset); }, 0);
        });

        // Fix 2: toggle fullscreen button icon between expand and collapse.
        const COLLAPSE_SVG =
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
          'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="4 14 10 14 10 20"></polyline>' +
          '<polyline points="20 10 14 10 14 4"></polyline>' +
          '<line x1="10" y1="14" x2="3" y2="21"></line>' +
          '<line x1="21" y1="3" x2="14" y2="10"></line>' +
          '</svg>';
        const btns = document.getElementById('player-wrap').querySelectorAll('.rr-controller__btns button');
        const fsBtn = btns.length ? btns[btns.length - 1] : null;
        const expandHtml = fsBtn ? fsBtn.innerHTML : null;
        function onFullscreenChange() {
          if (!fsBtn) return;
          const isFs = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
          fsBtn.innerHTML = isFs ? COLLAPSE_SVG : (expandHtml || '');
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
      })
      .catch(() => {
        document.getElementById('loading').textContent = 'Failed to load session events.';
      });
  </script>
</body>
</html>
